name: Test

# Runs the explorer test suite on every push and pull request.
# The recipe-contract tests in test_experiments.py act as drift protection
# against changes to experiments/, 10_interactive_lab/, or explorer/lib/.
#
# Ref: ADR-008 — Section 10 Interactive Lab.
# Ref: explorer/tests/ — pytest suite (test_ia, test_notes, test_components,
#       test_experiments, test_model_zoo).

on:
  push:
    branches: [main]
    paths:
      - 'explorer/**'
      - 'experiments/**'
      - '10_interactive_lab/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'explorer/**'
      - 'experiments/**'
      - '10_interactive_lab/**'
      - '.github/workflows/test.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.1.1
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: explorer/requirements.txt

      - name: Install Python dependencies
        # Prefer manylinux wheels for astroscrappy / PyWavelets — avoids
        # source compilation and the apt build-essential step.
        run: |
          python -m pip install --upgrade pip
          pip install --only-binary=astroscrappy,PyWavelets,scipy,scikit-image \
            -r explorer/requirements.txt
          pip install pytest pytest-cov

      - name: Run pytest
        run: |
          pytest explorer/tests/ -v --tb=short \
            --cov=explorer/lib --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report (Python 3.12 only)
        if: matrix.python-version == '3.12' && success()
        uses: actions/upload-artifact@v4.3.6
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

name: Lint

# Runs ruff (lint + format check) and mypy (best-effort) on every push and PR
# touching Python source. Mirrors the same checks .pre-commit-config.yaml runs
# locally so the local-vs-CI experience is identical.
#
# Ref: docs/03_implementation/coding_standards.md
# Ref: pyproject.toml — single source of truth for tool config.

on:
  push:
    branches: [main]
    paths:
      - 'explorer/**.py'
      - 'experiments/**.py'
      - 'scripts/**.py'
      - 'pyproject.toml'
      - '.pre-commit-config.yaml'
      - '.github/workflows/lint.yml'
  pull_request:
    branches: [main]
    paths:
      - 'explorer/**.py'
      - 'experiments/**.py'
      - 'scripts/**.py'
      - 'pyproject.toml'
      - '.pre-commit-config.yaml'
      - '.github/workflows/lint.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4.1.7

      - uses: actions/setup-python@v5.1.1
        with:
          python-version: '3.12'
          cache: pip

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          # Bumped from 0.5.7 → 0.11.13.  The older pin's `ruff format`
          # disagreed with newer editor-side ruff on the `assert ..., (...)`
          # wrapping rule (style flipped between 0.8 and 0.9).  0.11.13
          # is the first stable line where the wrapping converges with
          # what local installs in May 2026 produce.  See PR #45 review.
          pip install 'ruff==0.11.13' 'mypy==1.11.1'

      - name: Ruff lint
        run: ruff check explorer/ experiments/ scripts/

      - name: Ruff format check
        run: ruff format --check explorer/ experiments/ scripts/

      - name: mypy (best effort, non-blocking)
        # mypy is informational for now; we'll flip to blocking once the
        # codebase is fully typed (ADR follow-up tracked in CHANGELOG).
        continue-on-error: true
        run: mypy explorer/lib explorer/components || true

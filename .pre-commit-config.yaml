# Pre-commit hooks for eBERlight Explorer.
#
# Install once: `pip install pre-commit && pre-commit install`.
# Run on demand: `pre-commit run --all-files`.
#
# CI also runs the same suite via `.github/workflows/lint.yml`.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$|10_interactive_lab/datasets/.*'
      - id: end-of-file-fixer
        exclude: '10_interactive_lab/datasets/.*|10_interactive_lab/LICENSES/.*'
      - id: check-yaml
        # 10_interactive_lab/manifest.yaml uses anchors that confuse strict parsing.
        args: ['--unsafe']
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=20480']  # 20 MB ceiling — Sarepy sinograms exceed default
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Pinned in lockstep with .github/workflows/lint.yml so editor-
    # side and CI agree on `ruff format` output.  The older 0.5.7 pin
    # disagreed with newer local ruff on `assert …, (…)` wrapping
    # (style flipped between 0.8 and 0.9).  See PR #45 review.
    rev: v0.11.13
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(explorer|experiments|scripts)/.*\.py$
      - id: ruff-format
        files: ^(explorer|experiments|scripts)/.*\.py$
